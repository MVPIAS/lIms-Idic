version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lims-idic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lims
      POSTGRES_PASSWORD: lims
      POSTGRES_DB: lims_idic
      TZ: America/Santiago
      PGTZ: America/Santiago
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-pg.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lims -d lims_idic"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lims-idic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lims-idic-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-secret-key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mailhog para testing de emails en desarrollo
  mailhog:
    image: mailhog/mailhog:latest
    container_name: lims-idic-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # Metabase para BI local (opcional - solo si quieres probar BI)
  metabase:
    image: metabase/metabase:latest
    container_name: lims-idic-metabase
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: lims_idic
      MB_DB_PORT: 5432
      MB_DB_USER: lims
      MB_DB_PASS: lims
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["bi"]   # arranca solo con `docker compose --profile bi up`

volumes:
  pg_data:
  redis_data:
  minio_data:
