# =============================================================================
# LIMS IDIC · Preproducción (VPS) · stack completo detrás de Caddy (HTTPS)
# Colocar este archivo en la RAÍZ del monorepo (lims-idic/) junto al .env
# Arrancar:  docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# Solo Caddy expone 80/443. Postgres/Redis/MinIO NO se publican a Internet.
# =============================================================================
services:
  caddy:
    image: caddy:2-alpine
    container_name: lims-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on: [web, api]

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    container_name: lims-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    expose: ["3000"]
    depends_on: [api]

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    container_name: lims-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      # CORS restringido al dominio público (obligatorio en producción).
      CORS_ORIGINS: https://${DOMAIN}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      TZ: America/Santiago
    expose: ["3001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    container_name: lims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Santiago
      PGTZ: America/Santiago
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Sin "ports": solo accesible dentro de la red Docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lims-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lims-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    # consola/API solo internas; exponer vía Caddy si se necesita

  metabase:
    image: metabase/metabase:latest
    container_name: lims-metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    expose: ["3000"]
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  pg_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
